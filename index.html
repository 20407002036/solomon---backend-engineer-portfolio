
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solomon Kaniaru | Backend Engineer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "var(--color-primary)",
              "background": "var(--color-background)",
              "surface": "var(--color-surface)",
              "border": "var(--color-border)",
              "text-main": "var(--color-text-main)",
              "text-muted": "var(--color-text-muted)"
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"]
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-primary: #7000FF;
        --color-background: #ffffff;
        --color-surface: #f8f8f8;
        --color-border: #eeeeee;
        --color-text-main: #000000;
        --color-text-muted: #666666;
      }

      .dark {
        --color-primary: #7000FF;
        --color-background: #000000;
        --color-surface: #0a0a0a;
        --color-border: #1a1a1a;
        --color-text-main: #ffffff;
        /* Increase contrast for metadata/nav in dark mode */
        --color-text-muted: #a3a3a3;
      }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--color-background);
        color: var(--color-text-main);
        transition: background-color 0.3s ease, color 0.3s ease;
        letter-spacing: -0.01em;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.05em;
      }
      html {
        scroll-behavior: smooth;
      }
      .bg-grid {
        background-size: 60px 60px;
        background-image: radial-gradient(circle, #111 1px, transparent 1px);
      }
      ::selection {
        background: var(--color-primary);
        color: white;
      }
      /* Custom utility for the image's specific muted text */
      .text-dimmed {
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased transition-colors duration-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
